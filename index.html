<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #0078d7;
            color: white;
            padding: 20px;
        }

        main {
            padding: 40px 20px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        button {
            background-color: #0078d7;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bem-vindo ao meu site</h1>
    </header>

    <main>
        <h2>Página HTML Básica</h2>
        <p>Este é um exemplo simples de página HTML com CSS e JavaScript.</p>

        <button onclick="mostrarMensagem()">
            Clique aqui
        </button>
    </main>

    <footer>
        © 2026 Meu Site
    </footer>

    <script>
        function mostrarMensagem() {
            alert("Olá! Você clicou no botão.");
        }
    </script>

</body>
</html>
